name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write      # needed for mkdocs gh-deploy to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (with submodules so omicverse_guide is available) ──
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # full history lets mkdocs show last-updated dates

      # ── 2. Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip to speed up repeated runs ────────────────────────
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: docs-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: docs-pip-

      # ── 4. Install all dependencies (mirrors what readthedocs does) ───
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Configure git identity for gh-deploy push ──────────────────
      - name: Configure git
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ── 6. Build & deploy ─────────────────────────────────────────────
      # Run from the repo root, pointing --config-file at the submodule.
      # This ensures gh-deploy pushes to the main repo's gh-pages branch
      # rather than the submodule (omicverse-tutorials) repo.
      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force \
            --config-file omicverse_guide/mkdocs.yml \
            --remote-branch gh-pages \
            --message "docs: auto-deploy from {sha}"
