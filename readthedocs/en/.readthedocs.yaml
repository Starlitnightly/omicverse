# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

submodules:
  include: all
  recursive: true

sphinx:
  configuration: ../omicverse_guide/docs/conf.py
  fail_on_warning: false

python:
  install:
  - requirements: requirements.txt
  - requirements: ../omicverse_guide/requirements.txt
